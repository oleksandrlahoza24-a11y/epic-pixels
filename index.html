<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- Viewport settings strictly designed to prevent zooming and make it full screen on iPads -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Infinite Pixel Dungeon</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #111;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            touch-action: none;
            /* Prevents swipe-to-refresh and zooming */
            user-select: none;
        }

        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 8px 12px;
            box-sizing: border-box;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }

        /* Pixel panel shared style */
        .px-panel {
            background: #0d0d1a;
            outline: 2px solid #000;
            box-shadow: 3px 3px 0px #000, inset 1px 1px 0px #3a3a5a, inset -1px -1px 0px #05050f;
            padding: 6px 10px 8px 10px;
            image-rendering: pixelated;
        }

        /* Left stats panel */
        #stats-left {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        /* Pixel stat row: icon + label + bar or value */
        .stat-row {
            display: flex;
            align-items: center;
            gap: 5px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0px;
            /* hide any stray whitespace */
        }

        .stat-row svg {
            flex-shrink: 0;
            image-rendering: pixelated;
        }

        .stat-label {
            font-size: 11px;
            color: #aaaacc;
            text-shadow: 1px 1px 0 #000;
            letter-spacing: 1px;
            min-width: 28px;
        }

        /* HP bar container */
        .hp-bar-wrap {
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }

        .hp-bar-outer {
            width: 80px;
            height: 10px;
            background: #1a0000;
            outline: 2px solid #000;
            box-shadow: inset 1px 1px 0px #000;
            image-rendering: pixelated;
        }

        .hp-bar-inner {
            height: 100%;
            background: #e74c3c;
            box-shadow: inset 0 2px 0 #ff7070;
            transition: width 0.15s steps(10);
        }

        .hp-bar-inner.high {
            background: #2ecc71;
            box-shadow: inset 0 2px 0 #6eff9a;
        }

        .hp-bar-inner.mid {
            background: #f1c40f;
            box-shadow: inset 0 2px 0 #ffe870;
        }

        .hp-bar-inner.low {
            background: #e74c3c;
            box-shadow: inset 0 2px 0 #ff7070;
        }

        .hp-text {
            font-size: 10px;
            color: #fff;
            text-shadow: 1px 1px 0 #000;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 0px;
            min-width: 52px;
        }

        /* Stat value badge */
        .stat-val {
            font-size: 11px;
            color: #fff;
            text-shadow: 1px 1px 0 #000;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 0px;
            background: #1a1a2e;
            outline: 1px solid #000;
            padding: 1px 4px;
            min-width: 28px;
            text-align: center;
        }

        /* Right panel */
        #stats-right {
            display: flex;
            flex-direction: column;
            gap: 5px;
            align-items: flex-end;
        }

        .stat-row-right {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0px;
        }

        .stat-row-right svg {
            flex-shrink: 0;
            image-rendering: pixelated;
        }

        .stat-label-right {
            font-size: 11px;
            color: #aaaacc;
            text-shadow: 1px 1px 0 #000;
            letter-spacing: 1px;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Game Screen */
        #game-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        canvas {
            background-color: #222;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            image-rendering: pixelated;
            /* Keeps pixel art crisp */
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* iPad / Touch Controls Container */
        #controls {
            position: absolute;
            bottom: 24px;
            left: 0;
            width: 100%;
            height: 200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            box-sizing: border-box;
            z-index: 20;
        }

        /* D-Pad Layout */
        .dpad {
            position: relative;
            width: 190px;
            height: 190px;
        }




        .btn {
            position: absolute;
            width: 64px;
            height: 64px;
            background: #1a1a2e;
            border: none;
            border-radius: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            image-rendering: pixelated;
            box-shadow: 4px 4px 0px #000, inset 2px 2px 0px #4a4a6a, inset -2px -2px 0px #0a0a1a;
            cursor: pointer;
            outline: 2px solid #000;
            -webkit-tap-highlight-color: transparent;
        }




        .btn:active {
            box-shadow: 2px 2px 0px #000, inset 2px 2px 0px #0a0a1a, inset -2px -2px 0px #4a4a6a;
            transform: translate(2px, 2px);
        }




        .btn svg {
            image-rendering: pixelated;
        }




        #btn-up {
            top: 0;
            left: 63px;
        }

        #btn-down {
            bottom: 0;
            left: 63px;
        }

        #btn-left {
            top: 63px;
            left: 0;
        }

        #btn-right {
            top: 63px;
            right: 0;
        }




        /* Action Buttons */
        .actions {
            position: relative;
            width: 120px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
        }




        #btn-attack {
            width: 96px;
            height: 96px;
            border-radius: 0;
            background: #3d0000;
            border: none;
            outline: 2px solid #000;
            box-shadow: 4px 4px 0px #000, inset 2px 2px 0px #992222, inset -2px -2px 0px #1a0000;
            display: flex;
            justify-content: center;
            align-items: center;
            image-rendering: pixelated;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }




        #btn-attack:active {
            box-shadow: 2px 2px 0px #000, inset 2px 2px 0px #1a0000, inset -2px -2px 0px #992222;
            transform: translate(2px, 2px);
        }

        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            text-align: center;
            color: white;
            border: 4px solid white;
            z-index: 100;
        }

        #game-over h1 {
            margin-top: 0;
            color: #ff4444;
        }

        #game-over button {
            padding: 15px 30px;
            font-size: 20px;
            font-family: inherit;
            background: white;
            border: none;
            cursor: pointer;
        }

        @media (min-width: 1024px) {

            /* Fade out controls on big desktop screens where keyboard is assumed */
            #controls {
                opacity: 0.5;
            }
        }
    </style>
</head>

/**
 * ---------------------------------------------------------
 * 2. ENGINE & RENDERING (Pre-rendering for 60 FPS)
 * ---------------------------------------------------------
 */
const TILE_SIZE = 32;
const PIXEL_SCALE = TILE_SIZE / 8;
const CANVAS_WIDTH = 640;
const CANVAS_HEIGHT = 480;
const COLS = CANVAS_WIDTH / TILE_SIZE;
const ROWS = CANVAS_HEIGHT / TILE_SIZE;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// Pre-render grids to off-screen canvases for massive performance boost on iPads
const Textures = {};
function initTextures() {
    for (let key in GRIDS) {
        const grid = GRIDS[key];
        const offCanvas = document.createElement('canvas');
        offCanvas.width = TILE_SIZE;
        offCanvas.height = TILE_SIZE;
        const offCtx = offCanvas.getContext('2d');
        offCtx.imageSmoothingEnabled = false;
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const colorIdx = grid[r][c];
                if (colorIdx !== 0) {
                    offCtx.fillStyle = PALETTE[colorIdx];
                    offCtx.fillRect(c * PIXEL_SCALE, r * PIXEL_SCALE, PIXEL_SCALE, PIXEL_SCALE);
                }
            }
        }
        Textures[key] = offCanvas;
    }
}
initTextures();

/**
 * ---------------------------------------------------------
 * VFX ENGINE
 * Custom particle / effect system. All effects live here.
 * ---------------------------------------------------------
 */
const VFX = {
    particles: [],

    // Spawn a single floating damage number
    spawnDamageNumber(x, y, value, color) {
        this.particles.push({
            type: 'dmgnum',
            x, y,
            vy: -1.8,
            life: 40, maxLife: 40,
            value: value.toString(),
            color: color || '#ffffff'
        });
    },

    // Spawn dust puff (small square pixel particles)
    spawnDust(x, y, count, color) {
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const spd = 1 + Math.random() * 2.5;
            this.particles.push({
                type: 'dust',
                x: x + (Math.random() - 0.5) * 8,
                y: y + (Math.random() - 0.5) * 8,
                vx: Math.cos(angle) * spd,
                vy: Math.sin(angle) * spd,
                life: 20 + Math.floor(Math.random() * 15),
                maxLife: 35,
                size: 3 + Math.floor(Math.random() * 3),
                color: color || '#ffffff'
            });
        }
    },

    // Spawn a sword slash arc (directional sweep) with a trailing streak
    spawnSlash(cx, cy, dirX, dirY) {
        const perpX = -dirY;
        const perpY = dirX;
        const count = 9;
        for (let i = 0; i < count; i++) {
            const t = (i / (count - 1)) - 0.5;
            const ox = dirX * 24 + perpX * t * 34;
            const oy = dirY * 24 + perpY * t * 34;
            const spd = 2.5 + Math.abs(t) * 1.5;
            this.particles.push({
                type: 'slash',
                x: cx + ox,
                y: cy + oy,
                vx: dirX * spd + perpX * t * 1.2,
                vy: dirY * spd + perpY * t * 1.2,
                life: 8 + Math.floor((1 - Math.abs(t * 2)) * 6),
                maxLife: 14,
                size: Math.round(3 + (1 - Math.abs(t * 2)) * 3),
                color: i % 3 === 0 ? '#ffe870' : i % 3 === 1 ? '#ffffff' : '#ffaa00'
            });
        }
        // Add a central bright flash pixel
        this.particles.push({
            type: 'slash',
            x: cx + dirX * 20,
            y: cy + dirY * 20,
            vx: dirX * 1, vy: dirY * 1,
            life: 6, maxLife: 6,
            size: 6,
            color: '#ffffff'
        });
    },

    // Spawn enemy death explosion: 6 texture chunks that fly outward + fade
    spawnDeathChunks(ex, ey, ew, eh, texture) {
        const cols = 3, rows = 2;
        const cw = ew / cols;
        const ch = eh / rows;
        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                const angle = Math.atan2(row - 0.5, col - 1) + (Math.random() - 0.5) * 0.5;
                const spd = 1.0 + Math.random() * 0.8;
                const snap = document.createElement('canvas');
                snap.width = Math.ceil(cw);
                snap.height = Math.ceil(ch);
                const sCtx = snap.getContext('2d');
                sCtx.imageSmoothingEnabled = false;
                sCtx.drawImage(texture,
                    col * cw, row * ch, cw, ch,
                    0, 0, snap.width, snap.height
                );
                this.particles.push({
                    type: 'chunk',
                    x: ex + col * cw,
                    y: ey + row * ch,
                    vx: Math.cos(angle) * spd,
                    vy: Math.sin(angle) * spd - 0.4,
                    rot: (Math.random() - 0.5) * 0.15,
                    rotSpeed: (Math.random() - 0.5) * 0.08,
                    life: 40 + Math.floor(Math.random() * 10),
                    maxLife: 50,
                    w: snap.width,
                    h: snap.height,
                    img: snap,
                    gravity: 0.06
                });
            }
        }
        const dustColor = texture === Textures.slime ? '#2ecc71' : '#e74c3c';
        this.spawnDust(ex + ew / 2, ey + eh / 2, 6, dustColor);
    },

    // Spawn flash rings (death flash) — inner fast + outer slow
    spawnDeathFlash(cx, cy, color) {
        this.particles.push({
            type: 'ring',
            x: cx, y: cy,
            life: 14, maxLife: 14,
            radius: 3,
            expandRate: 5,
            color: color || '#ffffff'
        });
        this.particles.push({
            type: 'ring',
            x: cx, y: cy,
            life: 22, maxLife: 22,
            radius: 2,
            expandRate: 2.5,
            color: color || '#ffffff'
        });
    },

    // Spawn item pickup burst at a fixed world position (called after item is removed)
    spawnPickup(cx, cy, color) {
        const c = color || '#f1c40f';
        for (let i = 0; i < 6; i++) {
            const angle = (i / 6) * Math.PI * 2;
            const spd = 2.5 + Math.random() * 1.5;
            this.particles.push({
                type: 'dust',
                x: cx,
                y: cy,
                vx: Math.cos(angle) * spd,
                vy: Math.sin(angle) * spd - 0.5,
                life: 14,
                maxLife: 14,
                size: 3,
                color: c
            });
        }
    },

    // Spawn chest item throw arc: item image arcs out and lands
    spawnChestThrow(cx, cy, tex, itemType, rarity) {
        const angle = -Math.PI * 0.5 + (Math.random() - 0.5) * Math.PI * 0.8;
        const spd = 2.5 + Math.random() * 1.5;
        this.particles.push({
            type: 'itemthrow',
            x: cx, y: cy,
            vx: Math.cos(angle) * spd,
            vy: Math.sin(angle) * spd - 1,
            life: 50, maxLife: 50,
            gravity: 0.14,
            tex: tex,
            itemType: itemType,
            itemRarity: rarity || 'common',
            landed: false
        });
    },

    update() {
        for (let i = this.particles.length - 1; i >= 0; i--) {
            const p = this.particles[i];
            p.life--;
            if (p.life <= 0) {
                // When a thrown item lands and its particle expires, spawn a real item
                if (p.type === 'itemthrow' && p.landed) {
                    items.push(new Item(p.x - 11, p.y - 11, p.itemType, p.itemRarity));
                }
                this.particles.splice(i, 1);
                continue;
            }

            if (p.type === 'dust' || p.type === 'slash') {
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.88;
                p.vy *= 0.88;
            } else if (p.type === 'dmgnum') {
                p.y += p.vy;
                p.vy *= 0.94;
            } else if (p.type === 'chunk') {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += p.gravity;
                p.vx *= 0.92;
                p.rot += p.rotSpeed;
            } else if (p.type === 'ring') {
                p.radius += p.expandRate || 4;
            } else if (p.type === 'itemthrow') {
                if (!p.landed) {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += p.gravity;
                    p.vx *= 0.97;
                    // Land when moving down and near floor
                    if (p.vy > 0.5 && p.life < 35) {
                        p.landed = true;
                        p.vx = 0;
                        p.vy = 0;
                        p.life = 8; // Short linger then become real item
                    }
                }
            }
        }
    },

    draw() {
        for (const p of this.particles) {
            const alpha = p.life / p.maxLife;
            ctx.save();
            ctx.globalAlpha = alpha;

            if (p.type === 'dust') {
                ctx.fillStyle = p.color;
                // Pixelated square
                ctx.fillRect(Math.round(p.x), Math.round(p.y), p.size, p.size);

            } else if (p.type === 'slash') {
                ctx.fillStyle = p.color;
                ctx.fillRect(Math.round(p.x - p.size / 2), Math.round(p.y - p.size / 2), p.size, p.size);

            } else if (p.type === 'dmgnum') {
                ctx.font = 'bold 10px "Courier New"';
                ctx.imageSmoothingEnabled = false;
                ctx.fillStyle = '#000';
                ctx.fillText(p.value, Math.round(p.x) + 1, Math.round(p.y) + 1);
                ctx.fillStyle = p.color;
                ctx.fillText(p.value, Math.round(p.x), Math.round(p.y));

            } else if (p.type === 'chunk') {
                ctx.translate(Math.round(p.x + p.w / 2), Math.round(p.y + p.h / 2));
                ctx.rotate(p.rot);
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(p.img, -p.w / 2, -p.h / 2, p.w, p.h);

            } else if (p.type === 'ring') {
                ctx.strokeStyle = p.color;
                ctx.lineWidth = 3;
                ctx.globalAlpha = alpha * 0.7;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.stroke();

            } else if (p.type === 'itemthrow') {
                ctx.imageSmoothingEnabled = false;
                ctx.globalAlpha = p.landed ? alpha : 1;
                ctx.drawImage(p.tex, Math.round(p.x - 11), Math.round(p.y - 11), 22, 22);
            }

            ctx.restore();
        }
    }
};

/**
 * ---------------------------------------------------------
 * 3. GAME STATE & ENTITIES
 * ---------------------------------------------------------
 */
const Input = { up: false, down: false, left: false, right: false, attack: false };

// Item rarity tiers: common, uncommon, rare, legendary
const RARITY = {
    common:    { color: '#aaaaaa', glowColor: null,      label: 'COMMON'    },
    uncommon:  { color: '#2ecc71', glowColor: '#2ecc71', label: 'UNCOMMON'  },
    rare:      { color: '#3498db', glowColor: '#3498db', label: 'RARE'      },
    legendary: { color: '#f39c12', glowColor: '#f39c12', label: 'LEGENDARY' }
};

// Roll a rarity based on room depth
function rollRarity() {
    const r = Math.random();
    if (r < 0.05 + currentRoom * 0.003) return 'legendary';
    if (r < 0.15 + currentRoom * 0.005) return 'rare';
    if (r < 0.40) return 'uncommon';
    return 'common';
}

let currentRoom = 1;
let score = 0;
let roomMap = []; // 2D array: 1 for wall, 0 for floor, 2 for door
let enemies = [];
let items = [];
let chest = null; // One chest per cleared room
let doorsOpen = false;

// Used to shake the screen when hit
let screenShake = 0; 

class Player {
    constructor() {
        this.width = TILE_SIZE - 4; // slight bounding box reduction
        this.height = TILE_SIZE - 4;
        this.x = CANVAS_WIDTH / 2 - this.width / 2;
        this.y = CANVAS_HEIGHT / 2 - this.height / 2;
        
        this.maxHp = 100;
        this.hp = 100;
        this.speed = 4.0;
        this.dmg = 20;
        
        this.dir = { x: 1, y: 0 }; // Used for attack direction
        this.isAttacking = false;
        this.attackTimer = 0;
        this.iFrames = 0;
    }

    update() {
        if (this.iFrames > 0) this.iFrames--;

        let dx = 0;
        let dy = 0;

        if (Input.up) dy -= this.speed;
        if (Input.down) dy += this.speed;
        if (Input.left) dx -= this.speed;
        if (Input.right) dx += this.speed;

        // Normalize diagonal movement speed
        if (dx !== 0 && dy !== 0) {
            dx *= 0.707;
            dy *= 0.707;
        }

        if (dx !== 0 || dy !== 0) {
            // Update direction for attacks
            if (Math.abs(dx) > Math.abs(dy)) {
                this.dir = { x: dx > 0 ? 1 : -1, y: 0 };
            } else {
                this.dir = { x: 0, y: dy > 0 ? 1 : -1 };
            }
        }

        // Move X & Check Collision
        this.x += dx;
        if (this.checkWallCollision()) {
            this.x -= dx;
        }

        // Move Y & Check Collision
        this.y += dy;
        if (this.checkWallCollision()) {
            this.y -= dy;
        }

        // Keep bounds
        this.x = Math.max(0, Math.min(CANVAS_WIDTH - this.width, this.x));
        this.y = Math.max(0, Math.min(CANVAS_HEIGHT - this.height, this.y));

        // Attack Logic
        if (Input.attack && this.attackTimer === 0) {
            this.isAttacking = true;
            this.attackTimer = 20; // Attack cooldown
            this.processAttack();
        }

        if (this.attackTimer > 0) {
            this.attackTimer--;
            if (this.attackTimer < 10) this.isAttacking = false;
        }

        // Check Door Transitions
        if (doorsOpen) {
            const centerX = this.x + this.width/2;
            const centerY = this.y + this.height/2;
            const tileX = Math.floor(centerX / TILE_SIZE);
            const tileY = Math.floor(centerY / TILE_SIZE);

            if (roomMap[tileY] && roomMap[tileY][tileX] === 2) {
                nextRoom(tileX, tileY);
            }
        }
    }

    checkWallCollision() {
        // Check 4 corners of bounding box against room map
        const corners = [
            {x: this.x + 2, y: this.y + 2},
            {x: this.x + this.width - 2, y: this.y + 2},
            {x: this.x + 2, y: this.y + this.height - 2},
            {x: this.x + this.width - 2, y: this.y + this.height - 2}
        ];
        
        for (let p of corners) {
            const tx = Math.floor(p.x / TILE_SIZE);
            const ty = Math.floor(p.y / TILE_SIZE);
            if (roomMap[ty] && roomMap[ty][tx] === 1) return true; // 1 is Wall
            // 2 is door, if doors are closed act like a wall
            if (!doorsOpen && roomMap[ty] && roomMap[ty][tx] === 2) return true;
        }
        return false;
    }

    processAttack() {
        // Create hitbox in front of player
        const range = 40;
        let hx = this.x + this.width/2 + (this.dir.x * range) - 20;
        let hy = this.y + this.height/2 + (this.dir.y * range) - 20;
        let hw = 40;
        let hh = 40;

        // Slash VFX
        VFX.spawnSlash(
            this.x + this.width / 2 + this.dir.x * 28,
            this.y + this.height / 2 + this.dir.y * 28,
            this.dir.x, this.dir.y
        );

        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i];
            if (hx < e.x + e.width && hx + hw > e.x &&
                hy < e.y + e.height && hy + hh > e.y) {

                e.hp -= this.dmg;

                // Knockback
                e.x += this.dir.x * 20;
                e.y += this.dir.y * 20;

                // Hit flash + dust + damage number
                e.hitFlash = 6;
                e.squishX = 0.7;
                e.squishY = 1.3;
                VFX.spawnDust(e.x + e.width / 2, e.y + e.height / 2, 5, '#ffffff');
                VFX.spawnDamageNumber(e.x + e.width / 2, e.y, this.dmg, '#ffe870');

                if (e.hp <= 0) {
                    // Death explosion: 6 texture chunks + flash ring
                    VFX.spawnDeathChunks(e.x, e.y, e.width, e.height, e.tex);
                    VFX.spawnDeathFlash(
                        e.x + e.width / 2,
                        e.y + e.height / 2,
                        e.type === 'slime' ? '#2ecc71' : '#e74c3c'
                    );
                    score += e.maxHp;
                    rollDrop(e.x, e.y);
                    enemies.splice(i, 1);
                    checkRoomClear();
                }
            }
        }
    }

    takeDamage(amt) {
        if (this.iFrames === 0) {
            this.hp -= amt;
            this.iFrames = 30; // Half a second of invincibility
            screenShake = 10;
            updateUI();
            if (this.hp <= 0) {
                gameOver();
            }
        }
    }

    draw() {
        if (this.iFrames > 0 && Math.floor(Date.now() / 100) % 2 === 0) return;

        ctx.save();
        ctx.imageSmoothingEnabled = false;

        // Flip sprite to face movement direction
        if (this.dir.x < 0) {
            ctx.translate(this.x + this.width, this.y);
            ctx.scale(-1, 1);
            ctx.drawImage(Textures.player, 0, 0, this.width, this.height);
        } else {
            ctx.drawImage(Textures.player, this.x, this.y, this.width, this.height);
        }

        ctx.restore();

        // Attack range indicator
        if (this.isAttacking) {
            const range = 28;
            const sx = this.x + this.width / 2 + (this.dir.x * range) - 12;
            const sy = this.y + this.height / 2 + (this.dir.y * range) - 12;
            const flashAlpha = (this.attackTimer / 10) * 0.35;
            ctx.save();
            ctx.globalAlpha = flashAlpha;
            ctx.fillStyle = '#ffe870';
            ctx.fillRect(Math.round(sx), Math.round(sy), 24, 24);
            ctx.restore();
        }

        // Footstep dust while moving
        const moving = Input.up || Input.down || Input.left || Input.right;
        if (moving && Math.random() < 0.12) {
            VFX.particles.push({
                type: 'dust',
                x: this.x + this.width / 2 + (Math.random() - 0.5) * 6,
                y: this.y + this.height - 2,
                vx: (Math.random() - 0.5) * 0.4,
                vy: 0.3 + Math.random() * 0.3,
                life: 10, maxLife: 10,
                size: 2,
                color: '#34495e'
            });
        }
    }
}

class Enemy {
    constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.width = TILE_SIZE - 6;
        this.height = TILE_SIZE - 6;
        this.type = type; // 'slime' or 'demon'

        // Stats scale with room level
        const scale = 1 + (currentRoom * 0.1);

        if (type === 'slime') {
            this.maxHp = 30 * scale;
            this.speed = 1.5;
            this.dmg = 10 * scale;
            this.tex = Textures.slime;
        } else if (type === 'demon') {
            this.maxHp = 60 * scale;
            this.speed = 2.2;
            this.dmg = 20 * scale;
            this.tex = Textures.demon;
        } else if (type === 'skeleton') {
            this.maxHp = 20 * scale;   // Fragile but fast
            this.speed = 3.0;
            this.dmg = 15 * scale;
            this.tex = Textures.skeleton;
        } else if (type === 'golem') {
            this.maxHp = 200 * scale;  // Tank
            this.speed = 0.9;
            this.dmg = 35 * scale;
            this.tex = Textures.golem;
        }

        this.hp = this.maxHp;
        this.bob = Math.random() * Math.PI * 2;  // Offset so enemies don't sync
        this.hitFlash = 0;  // Frames of white hit flash remaining
        // Slimes squish when they move
        this.squishX = 1;
        this.squishY = 1;
        this.squishTimer = 0;
    }

    update() {
        this.bob += this.type === 'slime' ? 0.12 : 0.08;
        if (this.hitFlash > 0) this.hitFlash--;

        // Squish decay
        this.squishX += (1 - this.squishX) * 0.2;
        this.squishY += (1 - this.squishY) * 0.2;

        // Move towards player
        let dx = player.x - this.x;
        let dy = player.y - this.y;
        let dist = Math.sqrt(dx * dx + dy * dy);

        if (dist > 0) {
            let vx = (dx / dist) * this.speed;
            let vy = (dy / dist) * this.speed;

            this.x += vx;
            if (this.checkWallCollision()) this.x -= vx;

            this.y += vy;
            if (this.checkWallCollision()) this.y -= vy;

            // Slime squishes as it hops
            if (this.type === 'slime') {
                const hop = Math.sin(this.bob);
                this.squishX = 1 + Math.abs(hop) * 0.15;
                this.squishY = 1 - Math.abs(hop) * 0.15;
            }
        }

        // Damage Player on contact
        if (dist < (this.width / 2 + player.width / 2)) {
            player.takeDamage(this.dmg);
        }
    }

    checkWallCollision() {
        const corners = [
            {x: this.x, y: this.y},
            {x: this.x + this.width, y: this.y},
            {x: this.x, y: this.y + this.height},
            {x: this.x + this.width, y: this.y + this.height}
        ];
        
        for (let p of corners) {
            const tx = Math.floor(p.x / TILE_SIZE);
            const ty = Math.floor(p.y / TILE_SIZE);
            if (roomMap[ty] && roomMap[ty][tx] === 1) return true; 
            if (!doorsOpen && roomMap[ty] && roomMap[ty][tx] === 2) return true;
        }
        return false;
    }

    draw() {
        const cx = Math.round(this.x + this.width / 2);
        const cy = Math.round(this.y + this.height / 2);

        // Vertical bob offset (demons sway, slimes hop)
        const bobOffset = this.type === 'slime'
            ? -Math.abs(Math.sin(this.bob)) * 3
            : Math.sin(this.bob) * 1.5;

        // Ground shadow ellipse
        ctx.save();
        ctx.globalAlpha = 0.25;
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.ellipse(cx, this.y + this.height - 1, this.width * 0.4 * this.squishX, 3, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Draw sprite with squish transform
        ctx.save();
        ctx.translate(cx, cy + bobOffset);
        ctx.scale(this.squishX, this.squishY);
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(this.tex, -this.width / 2, -this.height / 2, this.width, this.height);

        // Hit flash: overlay white on top with source-atop
        if (this.hitFlash > 0) {
            ctx.globalAlpha = (this.hitFlash / 6) * 0.8;
            ctx.globalCompositeOperation = 'source-atop';
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);
        }

        ctx.restore();

        // Pixel HP Bar (only show when damaged)
        if (this.hp < this.maxHp) {
            const hpPercent = Math.max(0, this.hp / this.maxHp);
            const bx = Math.round(this.x);
            const by = Math.round(this.y + bobOffset) - 10;
            const bw = this.width;
            ctx.fillStyle = '#1a0000';
            ctx.fillRect(bx, by, bw, 5);
            const fillColor = hpPercent > 0.6 ? '#2ecc71' : hpPercent > 0.3 ? '#f1c40f' : '#e74c3c';
            ctx.fillStyle = fillColor;
            ctx.fillRect(bx, by, Math.round(bw * hpPercent), 5);
            ctx.fillStyle = 'rgba(255,255,255,0.25)';
            ctx.fillRect(bx, by, Math.round(bw * hpPercent), 2);
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1;
            ctx.strokeRect(bx + 0.5, by + 0.5, bw - 1, 4);
        }
    }
}

class Item {
    constructor(x, y, type, rarity) {
        this.x = x;
        this.y = y;
        this.width = TILE_SIZE - 10;
        this.height = TILE_SIZE - 10;
        this.type = type; // 'heart', 'sword', 'boot'
        this.rarity = rarity || 'common';
        this.bob = Math.random() * Math.PI * 2;
        this.glowPulse = Math.random() * Math.PI * 2;
        // Legendary/rare items emit ambient particles over time
        this.particleTimer = 0;
    }

    update() {
        this.bob += 0.07;
        this.glowPulse += 0.06;

        // Rare+ items occasionally emit ambient float particles
        const rarityData = RARITY[this.rarity];
        if (rarityData.glowColor) {
            this.particleTimer++;
            const interval = this.rarity === 'legendary' ? 8 : 18;
            if (this.particleTimer >= interval) {
                this.particleTimer = 0;
                VFX.particles.push({
                    type: 'dust',
                    x: this.x + this.width / 2 + (Math.random() - 0.5) * 8,
                    y: this.y + this.height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: -0.8 - Math.random() * 0.5,
                    life: 22, maxLife: 22,
                    size: 2,
                    color: rarityData.glowColor
                });
            }
        }

        // Pick up
        if (player.x < this.x + this.width && player.x + player.width > this.x &&
            player.y < this.y + this.height && player.y + player.height > this.y) {

            const pickX = this.x + this.width / 2;
            const pickY = this.y + this.height / 2;

            const rarityMult = this.rarity === 'legendary' ? 3 : this.rarity === 'rare' ? 2 : this.rarity === 'uncommon' ? 1.5 : 1;
            if (this.type === 'heart') {
                player.hp = Math.min(player.maxHp, player.hp + Math.round(25 * rarityMult));
            } else if (this.type === 'sword') {
                player.dmg += Math.round(5 * rarityMult);
            } else if (this.type === 'boot') {
                player.speed += 0.2 * rarityMult;
            } else if (this.type === 'shield') {
                player.maxHp += Math.round(20 * rarityMult);
                player.hp = Math.min(player.maxHp, player.hp + Math.round(20 * rarityMult));
            } else if (this.type === 'orb') {
                // Orb: grant a single magic bolt on next attack
                player.magicOrbs = (player.magicOrbs || 0) + Math.round(1 * rarityMult);
            } else if (this.type === 'key') {
                score += 500; // Bonus score for finding a key
            }

            // Pickup burst fires away from the now-deleted item position
            VFX.spawnPickup(pickX, pickY, RARITY[this.rarity].glowColor || '#ffffff');
            score += 50;
            updateUI();
            return true; // Flag for deletion
        }
        return false;
    }

    draw() {
        let tex = Textures.itemHeart;
        if (this.type === 'sword')   tex = Textures.itemSword;
        if (this.type === 'boot')    tex = Textures.itemBoot;
        if (this.type === 'shield')  tex = Textures.itemShield;
        if (this.type === 'orb')     tex = Textures.itemOrb;
        if (this.type === 'key')     tex = Textures.itemKey;

        const cx = this.x + this.width / 2;
        const cy = this.y + this.height / 2;
        const offsetY = Math.sin(this.bob) * 3;
        const rarityData = RARITY[this.rarity];

        // --- Rarity floor glow ---
        if (rarityData.glowColor) {
            const pulse = 0.55 + Math.sin(this.glowPulse) * 0.25;
            const radius = this.rarity === 'legendary' ? 18 : 13;
            const grad = ctx.createRadialGradient(cx, cy + offsetY, 1, cx, cy + offsetY, radius);
            grad.addColorStop(0, rarityData.glowColor + 'bb');
            grad.addColorStop(1, rarityData.glowColor + '00');
            ctx.save();
            ctx.globalAlpha = pulse;
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(cx, cy + offsetY, radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        // --- Legendary: orbiting pixel sparks ---
        if (this.rarity === 'legendary') {
            const t = Date.now() / 400;
            for (let i = 0; i < 3; i++) {
                const a = t + (i / 3) * Math.PI * 2;
                const ox = Math.cos(a) * 11;
                const oy = Math.sin(a) * 6;
                ctx.save();
                ctx.globalAlpha = 0.85;
                ctx.fillStyle = i % 2 === 0 ? '#f39c12' : '#fff';
                ctx.fillRect(Math.round(cx + ox - 1), Math.round(cy + offsetY + oy - 1), 2, 2);
                ctx.restore();
            }
        }

        // --- Rare: corner pixel brackets ---
        if (this.rarity === 'rare') {
            const bx = Math.round(this.x - 2);
            const by = Math.round(this.y + offsetY - 2);
            const bw = this.width + 4;
            const bh = this.height + 4;
            ctx.save();
            ctx.globalAlpha = 0.7 + Math.sin(this.glowPulse) * 0.2;
            ctx.fillStyle = '#3498db';
            // Top-left
            ctx.fillRect(bx, by, 4, 1); ctx.fillRect(bx, by, 1, 4);
            // Top-right
            ctx.fillRect(bx + bw - 4, by, 4, 1); ctx.fillRect(bx + bw - 1, by, 1, 4);
            // Bottom-left
            ctx.fillRect(bx, by + bh - 1, 4, 1); ctx.fillRect(bx, by + bh - 4, 1, 4);
            // Bottom-right
            ctx.fillRect(bx + bw - 4, by + bh - 1, 4, 1); ctx.fillRect(bx + bw - 1, by + bh - 4, 1, 4);
            ctx.restore();
        }

        // --- Uncommon: small pixel underline shimmer ---
        if (this.rarity === 'uncommon') {
            const shimmer = 0.5 + Math.sin(this.glowPulse * 1.5) * 0.3;
            ctx.save();
            ctx.globalAlpha = shimmer;
            ctx.fillStyle = '#2ecc71';
            ctx.fillRect(Math.round(this.x), Math.round(this.y + offsetY + this.height + 2), this.width, 2);
            ctx.restore();
        }

        // Draw item texture
        ctx.drawImage(tex, this.x, Math.round(this.y + offsetY), this.width, this.height);
    }
}

class Chest {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.width = TILE_SIZE;
        this.height = TILE_SIZE;
        this.opened = false;
        this.bob = 0;
        this.glowPulse = 0;
        this.openTimer = 0;
        // Pre-open shake: triggers when player is close but hasn't touched yet
        this.shakeIntensity = 0;
        this.shakeX = 0;
        // Spawn ring animation on open
        this.openRings = [];
        // Ambient float particles timer
        this.ambientTimer = 0;
    }

    update() {
        this.glowPulse += 0.05;
        this.ambientTimer++;

        if (!this.opened) {
            this.bob = Math.sin(Date.now() / 450) * 1.5;

            const cx = this.x + this.width / 2;
            const cy = this.y + this.height / 2;
            const px = player.x + player.width / 2;
            const py = player.y + player.height / 2;
            const dist = Math.sqrt((cx - px) ** 2 + (cy - py) ** 2);

            // Shake harder as player gets close
            if (dist < 80) {
                this.shakeIntensity = (1 - dist / 80) * 2.5;
                this.shakeX = (Math.random() - 0.5) * this.shakeIntensity;

                // Emit anticipation particles
                if (dist < 60 && this.ambientTimer % 6 === 0) {
                    VFX.particles.push({
                        type: 'dust',
                        x: cx + (Math.random() - 0.5) * 14,
                        y: cy - 4 + (Math.random() - 0.5) * 6,
                        vx: (Math.random() - 0.5) * 0.6,
                        vy: -0.9 - Math.random() * 0.5,
                        life: 18, maxLife: 18,
                        size: 2,
                        color: '#f1c40f'
                    });
                }
            } else {
                this.shakeIntensity *= 0.8;
                this.shakeX *= 0.8;
            }

            if (dist < 26) {
                this.open();
            }

        } else {
            this.openTimer++;

            // After open: keep emitting rising gold dust for a few seconds
            if (this.openTimer < 90 && this.ambientTimer % 4 === 0) {
                VFX.particles.push({
                    type: 'dust',
                    x: this.x + this.width / 2 + (Math.random() - 0.5) * 20,
                    y: this.y + this.height / 2 + (Math.random() - 0.5) * 8,
                    vx: (Math.random() - 0.5) * 1.0,
                    vy: -1.2 - Math.random() * 0.8,
                    life: 28, maxLife: 28,
                    size: 2,
                    color: Math.random() < 0.5 ? '#f1c40f' : '#ffffff'
                });
            }

            // Tick open rings
            for (let i = this.openRings.length - 1; i >= 0; i--) {
                this.openRings[i].r += 3.5;
                this.openRings[i].life -= 1;
                if (this.openRings[i].life <= 0) this.openRings.splice(i, 1);
            }
        }
    }

    open() {
        if (this.opened) return;
        this.opened = true;
        screenShake = 8;

        // Spawn 3 expanding rings for dramatic open effect
        for (let i = 0; i < 3; i++) {
            setTimeout(() => {
                this.openRings.push({ r: 4, life: 18, maxLife: 18 });
            }, i * 80);
        }

        // Throw 2-3 items
        const count = 2 + Math.floor(Math.random() * 2);
        const types = ['heart', 'sword', 'boot', 'shield', 'orb', 'key']
        for (let i = 0; i < count; i++) {
            const type = types[Math.floor(Math.random() * types.length)];
            const rarity = rollRarity();
            let tex = Textures.itemHeart;
            if (type === 'sword') tex = Textures.itemSword;
            if (type === 'boot') tex = Textures.itemBoot;
            setTimeout(() => {
                VFX.spawnChestThrow(
                    this.x + this.width / 2,
                    this.y + this.height / 2,
                    tex, type, rarity
                );
            }, i * 130);
        }

        // Big gold burst + multiple flash rings
        VFX.spawnDust(this.x + this.width / 2, this.y + this.height / 2, 20, '#f1c40f');
        VFX.spawnDust(this.x + this.width / 2, this.y + this.height / 2, 8, '#ffffff');
        VFX.spawnDeathFlash(this.x + this.width / 2, this.y + this.height / 2, '#f1c40f');
        setTimeout(() => VFX.spawnDeathFlash(this.x + this.width / 2, this.y + this.height / 2, '#fff8dc'), 120);
    }

    draw() {
        const tex = this.opened ? Textures.chestOpen : Textures.chestClosed;
        const cx = this.x + this.width / 2;
        const cy = this.y + this.height / 2;
        const offsetY = this.opened ? 0 : this.bob;
        const offsetX = this.opened ? 0 : this.shakeX;

        // Ground shadow
        ctx.save();
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.ellipse(cx, this.y + this.height, this.width * 0.4, 3, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Closed: pulsing floor glow + proximity aura
        if (!this.opened) {
            const pulse = 0.35 + Math.sin(this.glowPulse) * 0.18;
            const glowR = 22 + Math.sin(this.glowPulse * 0.7) * 4;
            const grad = ctx.createRadialGradient(cx, cy, 3, cx, cy, glowR);
            grad.addColorStop(0, '#f1c40f99');
            grad.addColorStop(1, '#f1c40f00');
            ctx.save();
            ctx.globalAlpha = pulse;
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // Pixel proximity prompt: "!" above chest when player is near
            const px = player.x + player.width / 2;
            const py = player.y + player.height / 2;
            const dist = Math.sqrt((cx - px) ** 2 + (cy - py) ** 2);
            if (dist < 70) {
                const promptAlpha = Math.min(1, (70 - dist) / 40);
                const promptBob = Math.sin(Date.now() / 300) * 2;
                ctx.save();
                ctx.globalAlpha = promptAlpha;
                ctx.font = 'bold 11px "Courier New"';
                ctx.fillStyle = '#000';
                ctx.fillText('!', cx - 3 + 1, this.y - 6 + promptBob + 1);
                ctx.fillStyle = '#f1c40f';
                ctx.fillText('!', cx - 3, this.y - 6 + promptBob);
                ctx.restore();
            }
        }

        // Open rings radiating outward
        for (const ring of this.openRings) {
            const ra = ring.life / ring.maxLife;
            ctx.save();
            ctx.globalAlpha = ra * 0.6;
            ctx.strokeStyle = '#f1c40f';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(cx, cy, ring.r, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        }

        // Draw chest sprite
        ctx.save();
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(tex, Math.round(this.x + offsetX), Math.round(this.y + offsetY), this.width, this.height);
        ctx.restore();
    }
}

let player = new Player();

/**
 * ---------------------------------------------------------
 * 4. ROOM GENERATION (Infinite Rogue-like algorithm)
 * ---------------------------------------------------------
 */
// Room type affects floor/wall texture and hazards
const ROOM_TYPES = ['normal', 'normal', 'normal', 'ice', 'lava', 'crypt', 'arena'];
let currentRoomType = 'normal';

function generateRoomMap() {
    // Pick a room type (weighted toward normal early on)
    const pool = currentRoom < 4
        ? ['normal', 'normal', 'normal']
        : currentRoom < 8
        ? ['normal', 'normal', 'ice', 'crypt']
        : ROOM_TYPES;
    currentRoomType = pool[Math.floor(Math.random() * pool.length)];

    roomMap = [];
    for (let y = 0; y < ROWS; y++) {
        let row = [];
        for (let x = 0; x < COLS; x++) {
            if (x === 0 || x === COLS - 1 || y === 0 || y === ROWS - 1) {
                row.push(1);
            } else {
                row.push(0);
            }
        }
        roomMap.push(row);
    }

    // Doors in middle of each wall
    roomMap[0][Math.floor(COLS/2)] = 2;
    roomMap[ROWS-1][Math.floor(COLS/2)] = 2;
    roomMap[Math.floor(ROWS/2)][0] = 2;
    roomMap[Math.floor(ROWS/2)][COLS-1] = 2;

    // --- Room-type layouts ---
    if (currentRoomType === 'arena') {
        // Arena: ring of pillars around the edge interior
        for (let x = 2; x < COLS-2; x += 3) {
            roomMap[2][x] = 1;
            roomMap[ROWS-3][x] = 1;
        }
        for (let y = 2; y < ROWS-2; y += 3) {
            roomMap[y][2] = 1;
            roomMap[y][COLS-3] = 1;
        }
    } else if (currentRoomType === 'crypt') {
        // Crypt: cross-shaped wall dividers with gaps
        const midX = Math.floor(COLS/2);
        const midY = Math.floor(ROWS/2);
        for (let x = 2; x < COLS-2; x++) {
            if (Math.abs(x - midX) > 1) roomMap[midY][x] = 1;
        }
        for (let y = 2; y < ROWS-2; y++) {
            if (Math.abs(y - midY) > 1) roomMap[y][midX] = 1;
        }
    } else if (currentRoomType === 'ice' || currentRoomType === 'lava') {
        // Ice/Lava: scattered pillar clusters
        const clusters = 2 + Math.floor(Math.random() * 3);
        for (let c = 0; c < clusters; c++) {
            let cx = 3 + Math.floor(Math.random()*(COLS-6));
            let cy = 3 + Math.floor(Math.random()*(ROWS-6));
            roomMap[cy][cx] = 1;
            if (cx+1 < COLS-1) roomMap[cy][cx+1] = 1;
            if (cy+1 < ROWS-1) roomMap[cy+1][cx] = 1;
        }
    } else {
        // Normal: random pillars
        const pillars = Math.floor(Math.random() * 4);
        for (let i = 0; i < pillars; i++) {
            let px = 2 + Math.floor(Math.random()*(COLS-4));
            let py = 2 + Math.floor(Math.random()*(ROWS-4));
            roomMap[py][px] = 1;
        }
    }
}

function spawnEnemies() {
    enemies = [];
    items = [];
    chest = null;
    doorsOpen = false;

    // Number of enemies scales with room
    let count = Math.min(15, 2 + Math.floor(currentRoom / 2));
    
    for (let i = 0; i < count; i++) {
        // Find empty spawn spot
        let ex = 0, ey = 0, valid = false;
        while (!valid) {
            let tx = 1 + Math.floor(Math.random()*(COLS-2));
            let ty = 1 + Math.floor(Math.random()*(ROWS-2));
            if (roomMap[ty][tx] === 0) { // Walkable
                ex = tx * TILE_SIZE;
                ey = ty * TILE_SIZE;
                
                // Don't spawn on top of player
                if (Math.abs(ex - player.x) > 100 || Math.abs(ey - player.y) > 100) {
                    valid = true;
                }
            }
        }

        // Spawn logic — new enemy types unlock by room
        let type = 'slime';
        const r = Math.random();
        if (currentRoom > 3 && r < 0.25) type = 'demon';
        if (currentRoom > 5 && r < 0.20) type = 'skeleton';
        if (currentRoom > 8 && r < 0.12) type = 'golem';
        if (currentRoom > 10 && r < 0.50) type = 'demon';

        // Lava rooms favor demons; ice rooms favor skeletons
        if (currentRoomType === 'lava' && currentRoom > 4 && Math.random() < 0.5) type = 'demon';
        if (currentRoomType === 'ice'  && currentRoom > 4 && Math.random() < 0.5) type = 'skeleton';

        enemies.push(new Enemy(ex, ey, type));
    }
}

function rollDrop(x, y) {
    // 35% chance to drop item
    if (Math.random() < 0.35) {
        const rand = Math.random();
        let type = 'heart';
        if (rand > 0.55 && rand <= 0.70) type = 'sword';
        if (rand > 0.70 && rand <= 0.82) type = 'boot';
        if (rand > 0.82 && rand <= 0.92) type = 'shield';
        if (rand > 0.92 && rand <= 0.97) type = 'orb';
        if (rand > 0.97) type = 'key';
        items.push(new Item(x, y, type));
    }
}

function checkRoomClear() {
    if (enemies.length === 0) {
        doorsOpen = true;
        // Spawn a chest in the center of the room
        const cx = Math.floor(COLS / 2) * TILE_SIZE;
        const cy = Math.floor(ROWS / 2) * TILE_SIZE;
        chest = new Chest(cx, cy);
    }
}

function nextRoom(exitTx, exitTy) {
    currentRoom++;
    generateRoomMap();
    spawnEnemies();
    
    // Position player at opposite door
    if (exitTy === 0) { // Exited top -> Enter bottom
        player.y = (ROWS - 2) * TILE_SIZE;
        player.x = exitTx * TILE_SIZE;
    } else if (exitTy === ROWS - 1) { // Exited bottom -> Enter top
        player.y = 1 * TILE_SIZE;
        player.x = exitTx * TILE_SIZE;
    } else if (exitTx === 0) { // Exited left -> Enter right
        player.x = (COLS - 2) * TILE_SIZE;
        player.y = exitTy * TILE_SIZE;
    } else if (exitTx === COLS - 1) { // Exited right -> Enter left
        player.x = 1 * TILE_SIZE;
        player.y = exitTy * TILE_SIZE;
    }

    updateUI();
}

/**
 * ---------------------------------------------------------
 * 5. CONTROLS (iPad Touch & Keyboard)
 * ---------------------------------------------------------
 */
// Keyboard for testing
window.addEventListener('keydown', (e) => {
    if (e.key === 'w' || e.key === 'ArrowUp') Input.up = true;
    if (e.key === 's' || e.key === 'ArrowDown') Input.down = true;
    if (e.key === 'a' || e.key === 'ArrowLeft') Input.left = true;
    if (e.key === 'd' || e.key === 'ArrowRight') Input.right = true;
    if (e.key === ' ' || e.key === 'Enter') Input.attack = true;
});
window.addEventListener('keyup', (e) => {
    if (e.key === 'w' || e.key === 'ArrowUp') Input.up = false;
    if (e.key === 's' || e.key === 'ArrowDown') Input.down = false;
    if (e.key === 'a' || e.key === 'ArrowLeft') Input.left = false;
    if (e.key === 'd' || e.key === 'ArrowRight') Input.right = false;
    if (e.key === ' ' || e.key === 'Enter') Input.attack = false;
});

// Touch controls for iPad
function bindTouch(btnId, keyName) {
    const btn = document.getElementById(btnId);
    
    const press = (e) => { e.preventDefault(); Input[keyName] = true; };
    const release = (e) => { e.preventDefault(); Input[keyName] = false; };

    // Support both Touch (iPad) and Mouse (PC clicking the UI)
    btn.addEventListener('touchstart', press, {passive: false});
    btn.addEventListener('touchend', release, {passive: false});
    btn.addEventListener('mousedown', press);
    btn.addEventListener('mouseup', release);
    btn.addEventListener('mouseleave', release);
}

bindTouch('btn-up', 'up');
bindTouch('btn-down', 'down');
bindTouch('btn-left', 'left');
bindTouch('btn-right', 'right');
bindTouch('btn-attack', 'attack');


/**
 * ---------------------------------------------------------
 * 6. GAME LOOP & RENDER
 * ---------------------------------------------------------
 */
let isGameOver = false;

function updateUI() {
    const hp = Math.floor(player.hp);
    const maxHp = player.maxHp;
    document.getElementById('ui-hp').innerText = hp;
    document.getElementById('ui-maxhp').innerText = maxHp;
    document.getElementById('ui-dmg').innerText = player.dmg;
    document.getElementById('ui-spd').innerText = player.speed.toFixed(1);
    const roomLabel = currentRoom + (currentRoomType !== 'normal' ? ' [' + currentRoomType.toUpperCase() + ']' : '');
    document.getElementById('ui-room').innerText = roomLabel;
    document.getElementById('ui-score').innerText = score;

    // Update pixel HP bar
    const pct = Math.max(0, Math.min(100, (hp / maxHp) * 100));
    const bar = document.getElementById('ui-hp-bar');
    bar.style.width = pct + '%';
    bar.className = 'hp-bar-inner ' + (pct > 60 ? 'high' : pct > 30 ? 'mid' : 'low');
}

function gameOver() {
    isGameOver = true;
    document.getElementById('game-over').style.display = 'block';
    document.getElementById('go-rooms').innerText = currentRoom - 1;
}

function drawMap() {
    for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
            let px = x * TILE_SIZE;
            let py = y * TILE_SIZE;
            let val = roomMap[y][x];

            // Pick tile textures based on room type
            const floorTex = currentRoomType === 'ice'  ? Textures.floorIce
                           : currentRoomType === 'lava' ? Textures.floorLava
                           : Textures.floor;
            const wallTex  = currentRoomType === 'ice'  ? Textures.wallIce
                           : currentRoomType === 'lava' ? Textures.wallLava
                           : Textures.wall;

            if (val === 0) {
                ctx.drawImage(floorTex, px, py);

                // Lava rooms: occasional shimmer overlay
                if (currentRoomType === 'lava' && (x * 3 + y * 7) % 13 === 0) {
                    ctx.fillStyle = 'rgba(231,76,60,0.10)';
                    ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                }

                // Subtle shadow cast down/right from adjacent walls
                const wallAbove = roomMap[y - 1] && roomMap[y - 1][x] === 1;
                const wallLeft  = roomMap[y][x - 1] === 1;
                if (wallAbove) {
                    ctx.fillStyle = 'rgba(0,0,0,0.28)';
                    ctx.fillRect(px, py, TILE_SIZE, 7);
                }
                if (wallLeft) {
                    ctx.fillStyle = 'rgba(0,0,0,0.18)';
                    ctx.fillRect(px, py, 5, TILE_SIZE);
                }

            } else if (val === 1) {
                ctx.drawImage(wallTex, px, py);

                // Top-edge highlight on walls to give depth
                ctx.fillStyle = 'rgba(255,255,255,0.06)';
                ctx.fillRect(px, py, TILE_SIZE, 2);

            } else if (val === 2) {
                if (doorsOpen) {
                    ctx.drawImage(Textures.doorOpen, px, py);
                    // Soft glow tint on open door
                    ctx.fillStyle = 'rgba(142,68,173,0.15)';
                    ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                } else {
                    ctx.drawImage(Textures.doorClosed, px, py);
                }
            }
        }
    }
}

function loop() {
    if (isGameOver) return;

    // Update Phase
    player.update();
    enemies.forEach(e => e.update());
    
    // Process Items and filter out collected ones
    items = items.filter(i => !i.update());

    // Update chest
    if (chest) chest.update();

    // Screen Shake Logic
    ctx.save();
    if (screenShake > 0) {
        let sx = (Math.random() - 0.5) * screenShake;
        let sy = (Math.random() - 0.5) * screenShake;
        ctx.translate(sx, sy);
        screenShake -= 1;
    }

    // VFX Update
    VFX.update();

    // Render Phase
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

    drawMap();
    if (chest) chest.draw();
    items.forEach(i => i.draw());
    enemies.forEach(e => e.draw());
    player.draw();
    VFX.draw();

    ctx.restore(); // Undo screen shake translation

    requestAnimationFrame(loop);
}

// Initialize
generateRoomMap();
spawnEnemies();
updateUI();
requestAnimationFrame(loop);

    </script>
