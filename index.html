/**
 * ---------------------------------------------------------
 * 6. GAME LOOP & RENDER
 * ---------------------------------------------------------
 */
let isGameOver = false;

function updateUI() {
    const hp = Math.floor(player.hp);
    const maxHp = player.maxHp;
    document.getElementById('ui-hp').innerText = hp;
    document.getElementById('ui-maxhp').innerText = maxHp;
    document.getElementById('ui-dmg').innerText = player.dmg;
    document.getElementById('ui-spd').innerText = player.speed.toFixed(1);
    const roomLabel = currentRoom + (currentRoomType !== 'normal' ? ' [' + currentRoomType.toUpperCase() + ']' : '');
    document.getElementById('ui-room').innerText = roomLabel;
    document.getElementById('ui-score').innerText = score;

    const pct = Math.max(0, Math.min(100, (hp / maxHp) * 100));
    const bar = document.getElementById('ui-hp-bar');
    bar.style.width = pct + '%';
    bar.className = 'hp-bar-inner ' + (pct > 60 ? 'high' : pct > 30 ? 'mid' : 'low');
}

function updateWeaponHUD() {
    const wep = WEAPONS[player.equippedWeapon];
    document.getElementById('weapon-name-tag').innerText = wep.name;
    // Draw weapon texture onto the slot canvas
    const slotCanvas = document.getElementById('weapon-slot-canvas');
    const sCtx = slotCanvas.getContext('2d');
    sCtx.imageSmoothingEnabled = false;
    sCtx.clearRect(0, 0, 32, 32);
    if (wep.texture && Textures[wep.texture]) {
        sCtx.drawImage(Textures[wep.texture], 0, 0, 32, 32);
    } else {
        // Fists: draw a small pixel fist
        sCtx.fillStyle = '#ffccaa';
        sCtx.fillRect(8,8,16,16);
        sCtx.fillStyle = '#000';
        sCtx.fillRect(6,6,20,2);
        sCtx.fillRect(6,24,20,2);
    }
    // Colour the attack button SVG to match weapon rarity
    document.getElementById('btn-attack').style.boxShadow =
        '4px 4px 0 #000, inset 2px 2px 0 ' + (RARITY[wep.rarity].glowColor || '#992222') + ', inset -2px -2px 0 #1a0000';
}

function gameOver() {
    isGameOver = true;
    document.getElementById('game-over').style.display = 'block';
    document.getElementById('go-rooms').innerText = currentRoom - 1;
}

function drawMap() {
    for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
            let px = x * TILE_SIZE;
            let py = y * TILE_SIZE;
            let val = roomMap[y][x];

            // Pick tile textures based on room type
            const floorTex = currentRoomType === 'ice'    ? Textures.floorIce
                           : currentRoomType === 'lava'   ? Textures.floorLava
                           : currentRoomType === 'forest' ? Textures.floorForest
                           : Textures.floor;
            const wallTex  = currentRoomType === 'ice'    ? Textures.wallIce
                           : currentRoomType === 'lava'   ? Textures.wallLava
                           : currentRoomType === 'forest' ? Textures.wallForest
                           : Textures.wall;

            if (val === 0) {
                ctx.drawImage(floorTex, px, py);

                // Lava rooms: occasional shimmer overlay
                if (currentRoomType === 'lava' && (x * 3 + y * 7) % 13 === 0) {
                    ctx.fillStyle = 'rgba(231,76,60,0.10)';
                    ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                }

                // Forest rooms: occasional vine drape shimmer
                if (currentRoomType === 'forest' && (x * 5 + y * 11) % 17 === 0) {
                    ctx.fillStyle = 'rgba(39,174,96,0.10)';
                    ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                }

                // Subtle shadow cast down/right from adjacent walls
                const wallAbove = roomMap[y - 1] && roomMap[y - 1][x] === 1;
                const wallLeft  = roomMap[y][x - 1] === 1;
                if (wallAbove) {
                    ctx.fillStyle = 'rgba(0,0,0,0.28)';
                    ctx.fillRect(px, py, TILE_SIZE, 7);
                }
                if (wallLeft) {
                    ctx.fillStyle = 'rgba(0,0,0,0.18)';
                    ctx.fillRect(px, py, 5, TILE_SIZE);
                }

            } else if (val === 1) {
                ctx.drawImage(wallTex, px, py);

                // Top-edge highlight on walls to give depth
                ctx.fillStyle = 'rgba(255,255,255,0.06)';
                ctx.fillRect(px, py, TILE_SIZE, 2);

            } else if (val === 3) {
                // Water puddle — draw forest floor underneath, then water on top
                ctx.drawImage(Textures.floorForest, px, py);
                ctx.drawImage(Textures.floorWater, px, py);
                // Ripple shimmer
                const ripple = (Math.floor(Date.now() / 400) + x + y) % 3;
                if (ripple === 0) {
                    ctx.fillStyle = 'rgba(93,173,226,0.22)';
                    ctx.fillRect(px + 4, py + 4, TILE_SIZE - 8, TILE_SIZE - 8);
                }
            } else if (val === 4) {
                // Bush cluster — draw floor underneath, then bush on top
                ctx.drawImage(floorTex, px, py);
                ctx.drawImage(Textures.bushCluster, px, py);
            } else if (val === 2) {
                if (doorsOpen) {
                    ctx.drawImage(Textures.doorOpen, px, py);
                    // Soft glow tint on open door
                    ctx.fillStyle = 'rgba(142,68,173,0.15)';
                    ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                } else {
                    ctx.drawImage(Textures.doorClosed, px, py);
                }
            }
        }
    }
}

function loop() {
    if (isGameOver) return;

    // Update Phase
    player.update();
    enemies.forEach(e => e.update());

    // Update orb projectiles
    orbs = orbs.filter(o => {
        o.x += o.vx;
        o.y += o.vy;
        o.life--;
        o.pulse += 0.25;

        // Wall collision
        const tx = Math.floor(o.x / TILE_SIZE);
        const ty = Math.floor(o.y / TILE_SIZE);
        if (roomMap[ty] && roomMap[ty][tx] === 1) {
            VFX.spawnDust(o.x, o.y, 6, '#9b59b6');
            return false;
        }

        // Enemy collision
        for (let i = enemies.length - 1; i >= 0; i--) {
            const e = enemies[i];
            if (o.x > e.x && o.x < e.x + e.width && o.y > e.y && o.y < e.y + e.height) {
                e.hp -= o.dmg;
                e.hitFlash = 8;
                VFX.spawnDamageNumber(e.x + e.width/2, e.y, Math.round(o.dmg), '#9b59b6');
                VFX.spawnDeathFlash(o.x, o.y, '#9b59b6');
                if (e.hp <= 0) {
                    VFX.spawnDeathChunks(e.x, e.y, e.width, e.height, e.tex);
                    score += e.maxHp;
                    rollDrop(e.x, e.y);
                    enemies.splice(i, 1);
                    checkRoomClear();
                }
                return false;
            }
        }
        return o.life > 0;
    });

    // Lava room: periodic floor damage
    if (currentRoomType === 'lava') {
        lavaTimer++;
        if (lavaTimer >= 90) {
            lavaTimer = 0;
            player.takeDamage(5);
            VFX.spawnDust(player.x + player.width/2, player.y + player.height, 4, '#e74c3c');
        }
    }

    // Process Items and filter out collected ones
    items = items.filter(i => !i.update());

    // Update chest
    if (chest) chest.update();

    // Screen Shake Logic
    ctx.save();
    if (screenShake > 0) {
        let sx = (Math.random() - 0.5) * screenShake;
        let sy = (Math.random() - 0.5) * screenShake;
        ctx.translate(sx, sy);
        screenShake -= 1;
    }

    // VFX Update
    VFX.update();

    // Render Phase
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

    drawMap();

    // Draw floor cracks (hammer slam residue)
    floorCracks = floorCracks.filter(c => { c.life--; return c.life > 0; });
    floorCracks.forEach(c => {
        const a = Math.min(1, c.life / 60) * 0.75;
        ctx.save();
        ctx.globalAlpha = a;
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(Textures.floorCrack, Math.round(c.x), Math.round(c.y), 32, 32);
        // Second larger crack slightly offset
        ctx.globalAlpha = a * 0.5;
        ctx.drawImage(Textures.floorCrack, Math.round(c.x - 16), Math.round(c.y - 8), 48, 48);
        ctx.restore();
    });

    if (chest) chest.draw();
    items.forEach(i => i.draw());
    enemies.forEach(e => e.draw());
    player.draw();

    // Draw orb projectiles
    orbs.forEach(o => {
        const a = o.life / o.maxLife;
        const r = 7 + Math.sin(o.pulse) * 2;
        ctx.save();
        ctx.globalAlpha = a;
        const grad = ctx.createRadialGradient(o.x, o.y, 1, o.x, o.y, r);
        grad.addColorStop(0, '#ffffff');
        grad.addColorStop(0.4, '#d2b4de');
        grad.addColorStop(1, '#9b59b600');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(o.x, o.y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = a * 0.9;
        ctx.fillStyle = '#9b59b6';
        ctx.fillRect(Math.round(o.x - 3), Math.round(o.y - 3), 6, 6);
        ctx.restore();
    });

    VFX.draw();

    ctx.restore(); // Undo screen shake translation

    requestAnimationFrame(loop);
}

// Initialize
generateRoomMap();
spawnEnemies();
updateUI();
updateWeaponHUD();
requestAnimationFrame(loop);
